# Что сканировать. geoip-scan берет CIDR из Xray/V2Ray geoip.dat.
geoip_dat_path = "geoip.dat"
geoip_codes = ["ru"]
subnets = [
  "1.2.3.0/24",
  "5.6.0.0/16"
]

# Метка для имени файлов результата и отдельного resume state.
operator = "beeline"

# Консоль: plain (строки, надёжно), tui (дашборд), auto (TUI только с PIZDOS_TUI=1)
console = "tui"

# В Docker/WSL надежнее RAW: compose уже выдает NET_RAW.
# DGRAM можно использовать без sudo на Linux, если разрешен net.ipv4.ping_group_range.
socket_type = "DGRAM" # DGRAM or RAW

ping_type = [
    "ICMP",
    "TCP"
]
# Список сканируемых портов
tcp_ports = [443]

# Параллельность по /24 подсетям. 1 = последовательный режим (по умолчанию).
# Увеличивайте постепенно: 2, 4, 8...
subnet_parallelism = 1

# Опционально: ручной лимит одновременных host-probe (ICMP/TCP).
# Если закомментировано — автоподбор от subnet_parallelism.
# host_probe_parallelism = 900


# Тюнинг probe.
# probe_attempts: сколько раз пробовать ICMP/TCP на один IP (>=1).
# icmp_timeout_ms: timeout одного ICMP запроса.
# icmp_retry_delay_ms: пауза между ICMP попытками.
# tcp_timeout_ms: timeout одного TCP подключения (на порт).
probe_attempts = 2
icmp_timeout_ms = 1000
icmp_retry_delay_ms = 200
tcp_timeout_ms = 2000

# Для HTTPS/TLS TCP-проверки с SNI. Если включить, tcp_ports должны быть TLS-портами.
#tcp_sni_host = "example.com"

# Принудительно слать ICMP/TCP через конкретный сетевой интерфейс Linux.
# Оставьте закомментированным, чтобы выбирать маршрут по системной таблице маршрутизации.
# В Docker для этого включен network_mode: host в compose.yaml.
# network_interface = "eth0"

# Контрольный endpoint (IP или hostname).
# После каждой /24 сканер проверяет, что сеть жива.
endpoint = "77.88.8.8"

# Что делать, если endpoint не отвечает после ретраев:
# - Stop: остановить скан
# - ChangeIp: вызвать [task].change_ip_url, подождать [task].delay_seconds, проверить endpoint снова
# Важно: Если где-то выбран ChangeIp, task.change_ip_url должен быть задан.
endpoint_failure_action = "Stop"


# Плановые действия между подсетями.
[task]
# После каждых N обработанных /24 выполнить stop_action.
# 0 = не выполнять плановое действие.
# Пример: stop_every_times=10 и stop_action="ChangeIp" -> ротация после каждых 10 /24.
stop_every_times = 0

# Действие по расписанию:
# - Prompt: ждать Enter
# - Delay: пауза на delay_seconds
# - ChangeIp: вызвать change_ip_url
stop_action = "Prompt"

# URL для ротации IP (локальный API роутера/модема/VPN-скрипта).
# Используется и для аварийного, и для планового ChangeIp:
# - endpoint_failure_action = "ChangeIp"
# - stop_action = "ChangeIp"
change_ip_url = "http://127.0.0.1/changeIp"

# Пауза в секундах:
# - после endpoint_failure_action="ChangeIp"
# - при stop_action="Delay"
delay_seconds = 5

# Остановить скан, когда указанный ресурс стал TCP-достижим.
# Проверка идёт до и после каждой /24. Если сработало после скана,
# результат последней подсети не пишется и не попадает в resume state.
[stop_on_available]
enabled = true
target = "google1.com"
port = 443
check_before_subnet = true
check_after_subnet = true

# Результаты и resume.
results_dir = "results"
resume_state_dir = "results/state"
resume = true

logger_filetype = [     # csv, json
#    "Csv",
#    "Json"
]


# GeoIP-обогащение результатов. Не обязательно для скана, но дает city/asn/as_name.
#geoip_city_db = "/home/user/GeoLite2-City.mmdb"
#geoip_asn_db = "/home/user/GeoLite2-ASN.mmdb"

ipinfo_providers = [
    "ip-api.com",
    "ipinfo.com",
    "ipwho.is",
    "ip.sb",
    "ipapi.co",
    "GeoIP"
]

[[db_update]]
db_type = "GeoLite2City"
update_urls = [
    "https://git.io/GeoLite2-City.mmdb",
    "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-City.mmdb"
]

[[db_update]]
db_type = "GeoLite2ASN"
update_urls = [
    "https://git.io/GeoLite2-ASN.mmdb",
    "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb"
]

