name: Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-binary:
    name: Build release binaries
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            asset_name: pizdos-scanner-linux-x86_64
            target: x86_64-unknown-linux-gnu
            verify_exec: true
          - runner: ubuntu-22.04-arm
            asset_name: pizdos-scanner-linux-arm64
            target: aarch64-unknown-linux-gnu
            verify_exec: true
          - runner: ubuntu-22.04
            asset_name: pizdos-scanner-linux-armv7
            target: armv7-unknown-linux-gnueabihf
            verify_exec: false
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install armv7 toolchain
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf
          echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc" >> "$GITHUB_ENV"

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/pizdos-scanner" "dist/${{ matrix.asset_name }}"
          chmod +x "dist/${{ matrix.asset_name }}"
          tar -C dist -czf "dist/${{ matrix.asset_name }}.tar.gz" "${{ matrix.asset_name }}"
          sha256sum "dist/${{ matrix.asset_name }}" "dist/${{ matrix.asset_name }}.tar.gz" > "dist/${{ matrix.asset_name }}.sha256"

      - name: Prepare armv7 smoke inputs
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          curl -fsSL https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat -o dist/geoip.dat
          cat > dist/ci-config.toml <<'EOF'
          geoip_dat_path = "geoip.dat"
          subnets = []
          EOF

      - name: Verify binary
        run: |
          file "dist/${{ matrix.asset_name }}"
          if [ "${{ matrix.verify_exec }}" = "true" ]; then
            "./dist/${{ matrix.asset_name }}" --version
          else
            echo "Skip runtime execute check for cross-built target: ${{ matrix.target }}"
          fi

      - name: Set up QEMU for armv7 smoke
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Smoke test armv7 in QEMU container
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v "$PWD/dist:/dist:ro" \
            arm32v7/debian:bookworm \
            sh -ec '
              apt-get update
              apt-get install -y --no-install-recommends libssl3 ca-certificates
              /dist/pizdos-scanner-linux-armv7 --version
              cd /dist
              /dist/pizdos-scanner-linux-armv7 --config /dist/ci-config.toml geoip-list
            '

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-${{ matrix.asset_name }}
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-push, build-binary]
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-binary-*
          merge-multiple: true
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pizdos-scanner-linux-x86_64
            dist/pizdos-scanner-linux-x86_64.tar.gz
            dist/pizdos-scanner-linux-x86_64.sha256
            dist/pizdos-scanner-linux-arm64
            dist/pizdos-scanner-linux-arm64.tar.gz
            dist/pizdos-scanner-linux-arm64.sha256
            dist/pizdos-scanner-linux-armv7
            dist/pizdos-scanner-linux-armv7.tar.gz
            dist/pizdos-scanner-linux-armv7.sha256
          body: |
            ## Artifacts

            - Docker: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            - Binaries:
              - `pizdos-scanner-linux-x86_64` (+ `.tar.gz`, `.sha256`)
              - `pizdos-scanner-linux-arm64` (+ `.tar.gz`, `.sha256`)
              - `pizdos-scanner-linux-armv7` (+ `.tar.gz`, `.sha256`)
            - Binary builders:
              - `ubuntu-22.04` for x86_64 (better glibc compatibility)
              - `ubuntu-22.04-arm` for arm64 (native build/verify, better glibc compatibility)
              - `ubuntu-22.04` + cross-compiler for armv7 (Raspberry Pi OS 32-bit)

            ## Run binary

            ```bash
            chmod +x pizdos-scanner-linux-x86_64  # or arm64 / armv7
            ./pizdos-scanner-linux-x86_64 geoip-list
            ```

            ## Verify checksums

            ```bash
            sha256sum -c pizdos-scanner-linux-x86_64.sha256
            sha256sum -c pizdos-scanner-linux-arm64.sha256
            sha256sum -c pizdos-scanner-linux-armv7.sha256
            ```
