name: Release Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths-ignore:
      - "README.md"

permissions:
  contents: write

jobs:
  release-docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --pull \
            --tag pizdos-scanner:ci \
            .

      - name: Tag release image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag pizdos-scanner:ci pizdos-scanner:${GITHUB_REF_NAME}
          docker tag pizdos-scanner:ci pizdos-scanner:latest

      - name: Save image artifact
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist
          docker save pizdos-scanner:${GITHUB_REF_NAME} pizdos-scanner:latest \
            | gzip -9 > dist/pizdos-scanner-docker-image.tar.gz
          sha256sum dist/pizdos-scanner-docker-image.tar.gz \
            > dist/pizdos-scanner-docker-image.tar.gz.sha256

      - name: Upload GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pizdos-scanner-docker-image.tar.gz
            dist/pizdos-scanner-docker-image.tar.gz.sha256
