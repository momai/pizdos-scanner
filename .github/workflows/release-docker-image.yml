name: Docker

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths-ignore:
      - "README.md"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Быстрый запуск

            ```bash
            git clone https://github.com/momai/pizdos-scanner
            cd pizdos-scanner

            docker pull ghcr.io/momai/pizdos-scanner:latest
            curl -L -o geoip.dat \
              https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat

            docker compose run --rm pizdos-scanner geoip-scan ru
            ```

            Docker image: `ghcr.io/momai/pizdos-scanner:${{ github.ref_name }}`
