name: Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-binary:
    name: Build release binary
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: cargo build --release --locked

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp target/release/pizdos-scanner dist/pizdos-scanner-linux-x86_64
          chmod +x dist/pizdos-scanner-linux-x86_64
          tar -C dist -czf dist/pizdos-scanner-linux-x86_64.tar.gz pizdos-scanner-linux-x86_64
          sha256sum dist/pizdos-scanner-linux-x86_64 dist/pizdos-scanner-linux-x86_64.tar.gz > dist/sha256sums.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-push, build-binary]
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binary
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pizdos-scanner-linux-x86_64
            dist/pizdos-scanner-linux-x86_64.tar.gz
            dist/sha256sums.txt
          body: |
            ## Artifacts

            - Docker: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            - Binary: `pizdos-scanner-linux-x86_64` and `.tar.gz` attached to this release.

            ## Run binary

            ```bash
            chmod +x pizdos-scanner-linux-x86_64
            ./pizdos-scanner-linux-x86_64 geoip-list
            ```

            ## Verify checksums

            ```bash
            sha256sum -c sha256sums.txt
            ```
